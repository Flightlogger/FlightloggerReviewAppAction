name: 'FlightLogger Review App'
description: 'Create and destroy Heroku review apps with Cloudflare DNS management'
inputs:
  command:
    description: "'create' or 'destroy'"
    required: true
  pr_number:
    description: 'Pull request number'
    required: true
  pr_branch:
    description: 'Pull request branch name (required for create)'
    required: false
  heroku_api_key:
    description: 'Heroku Platform API key'
    required: true
  heroku_pipeline_id:
    description: 'Heroku pipeline UUID'
    required: true
  cloudflare_api_token:
    description: 'Cloudflare API token (required for destroy)'
    required: false
  review_domain:
    description: 'Review app domain'
    default: 'flightlogger-trail.net'
  subdomain_prefixes:
    description: 'Comma-separated subdomain prefixes'
    default: 'demo,my,api'
runs:
  using: 'node24'
  main: 'dist/index.js'
