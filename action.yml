name: 'FlightLogger Review App'
description: 'Create and destroy Heroku review apps'
inputs:
  command:
    description: "'create' or 'destroy'"
    required: true
  pr_number:
    description: 'Pull request number'
    required: true
  pr_branch:
    description: 'Pull request branch name (required for create)'
    required: false
  heroku_api_key:
    description: 'Heroku Platform API key'
    required: true
  heroku_pipeline_id:
    description: 'Heroku pipeline UUID'
    required: true
runs:
  using: 'node24'
  main: 'dist/index.js'
