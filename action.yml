name: 'FlightLogger Review App'
description: 'GitHub Action to create and destroy Heroku review apps via the Platform API for GitHub-connected pipelines'
inputs:
  command:
    description: "'create' or 'destroy'"
    required: true
  pr_number:
    description: 'Pull request number'
    required: true
  pr_branch:
    description: 'Pull request branch name (required for create)'
    required: false
  heroku_api_key:
    description: 'Heroku Platform API key'
    required: true
  heroku_pipeline_id:
    description: 'Heroku pipeline UUID'
    required: true
  github_token:
    description: 'GitHub token for fetching source tarball'
    required: true
  cloudflare_api_token:
    description: 'Cloudflare API token (required for destroy)'
    required: false
  review_domain:
    description: 'Review app domain (required for destroy)'
    required: false
  subdomain_prefixes:
    description: 'Comma-separated subdomain prefixes (required for destroy)'
    required: false
runs:
  using: 'node24'
  main: 'dist/index.js'
